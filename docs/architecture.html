<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vespera Architecture</title>
<style>
  body { margin: 0; background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
</style>
</head>
<body>
<svg viewBox="0 0 900 640" width="900" height="640" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="900" height="640" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700">Vespera — System Architecture</text>

  <!-- ── CONNECTORS (drawn first so nodes sit on top) ── -->

  <!-- User → Chat interfaces -->
  <line x1="450" y1="90" x2="180" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="90" x2="450" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="90" x2="720" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Chat interfaces → Handoff -->
  <line x1="180" y1="176" x2="390" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="176" x2="450" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="176" x2="510" y2="228" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Handoff → Local model -->
  <line x1="360" y1="264" x2="210" y2="320" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <!-- Handoff → Web Search -->
  <line x1="450" y1="280" x2="450" y2="320" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <!-- Handoff → Cloud AI -->
  <line x1="540" y1="264" x2="690" y2="320" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>

  <!-- Memory store connections -->
  <line x1="210" y1="356" x2="300" y2="430" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="356" x2="390" y2="430" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Background components → Memory -->
  <line x1="150" y1="530" x2="270" y2="500" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="530" x2="340" y2="500" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="530" x2="420" y2="500" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="530" x2="460" y2="488" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Memory → Handoff (context feed) -->
  <path d="M 345 430 Q 250 340 360 270" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrc)"/>
  <text x="248" y="352" fill="#38bdf8" font-size="10">context</text>

  <!-- ── ARROWHEAD MARKERS ── -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrc" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
  </defs>

  <!-- ── USER ── -->
  <ellipse cx="450" cy="72" rx="70" ry="24" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="77" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">You</text>

  <!-- ── INTERFACES ── -->
  <!-- Web UI -->
  <rect x="100" y="140" width="160" height="36" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="180" y="163" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600">Web UI  :3055</text>

  <!-- chat.py CLI -->
  <rect x="370" y="140" width="160" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="450" y="163" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">CLI  chat.py</text>

  <!-- Telegram -->
  <rect x="640" y="140" width="160" height="36" rx="6" fill="#1a2e1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="720" y="163" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Telegram Bot</text>

  <!-- ── API / HANDOFF ── -->
  <rect x="340" y="228" width="220" height="52" rx="8" fill="#2d1b4e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450" y="250" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">api.py  +  handoff.py</text>
  <text x="450" y="268" text-anchor="middle" fill="#7c6aad" font-size="10">routes messages · scores complexity</text>

  <!-- ── RESPONSE LAYER ── -->
  <!-- Local model -->
  <rect x="100" y="320" width="220" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="210" y="343" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Local Model  (Ollama)</text>

  <!-- Web Search -->
  <rect x="340" y="320" width="220" height="36" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="450" y="343" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Web Search</text>

  <!-- Cloud AI -->
  <rect x="580" y="320" width="220" height="36" rx="6" fill="#2a1a0e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="690" y="343" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="600">Cloud AI  (optional)</text>

  <!-- ── MEMORY STORE ── -->
  <rect x="250" y="430" width="300" height="60" rx="8" fill="#12261a" stroke="#4ade80" stroke-width="2"/>
  <text x="400" y="456" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Memory Store  (SQLite)</text>
  <text x="400" y="474" text-anchor="middle" fill="#4ade80" font-size="10">working → recent → validated → core</text>

  <!-- ── BACKGROUND DAEMONS ── -->
  <rect x="60" y="528" width="180" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="150" y="548" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Background Loop</text>
  <text x="150" y="562" text-anchor="middle" fill="#64748b" font-size="9">thinks every 3 min</text>

  <rect x="260" y="528" width="160" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="340" y="548" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Cleanup Crew</text>
  <text x="340" y="562" text-anchor="middle" fill="#64748b" font-size="9">reviews every 5 min</text>

  <rect x="440" y="528" width="180" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="530" y="548" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Periodic Pruning</text>
  <text x="530" y="562" text-anchor="middle" fill="#64748b" font-size="9">deep review every 3 days</text>

  <rect x="640" y="528" width="160" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="720" y="548" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Scheduler</text>
  <text x="720" y="562" text-anchor="middle" fill="#64748b" font-size="9">reminders · TTS · Telegram</text>

  <!-- ── LEGEND ── -->
  <rect x="20" y="390" width="200" height="92" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="120" y="408" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700">LEGEND</text>
  <line x1="32" y1="420" x2="60" y2="420" stroke="#64748b" stroke-width="1.5"/>
  <text x="68" y="424" fill="#94a3b8" font-size="10">request / response</text>
  <line x1="32" y1="438" x2="60" y2="438" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="68" y="442" fill="#94a3b8" font-size="10">conditional routing</text>
  <line x1="32" y1="456" x2="60" y2="456" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="68" y="460" fill="#38bdf8" font-size="10">memory context feed</text>
  <line x1="32" y1="474" x2="60" y2="474" stroke="#475569" stroke-width="1.5"/>
  <text x="68" y="478" fill="#94a3b8" font-size="10">background writes</text>

</svg>
</body>
</html>
